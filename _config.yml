title: 0xPix3l
tagline: Security Research & Hacking
description: Offensive security blog by 0xPix3l
url: "https://0xpix3l.github.io"
baseurl: ""

# Terminal prompt — shown in window chrome
prompt_user: "0xPix3l"
prompt_host: "home"
prompt_symbol: "$"

# Words per minute for reading time calculation (default 200)
wpm: 200

# Author info — the name links to author_url in posts
author:
  name: 0xPix3l
  url: "https://x.com/zzziadmo"   # where the author name links to in posts

# Social links — appear in sidebar "Connect" section
# Add as many as you like; each needs a name, url, and optionally an icon
social_links:
  - name: X / Twitter
    url: https://x.com/zzziadmo
  - name: LinkedIn
    url: https://www.linkedin.com/in/ziadmohamed1/
  - name: Github
    url: https://github.com/0xPix3l

timezone: UTC

permalink: /:categories/:title/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      toc: true

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-last-modified-at

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
